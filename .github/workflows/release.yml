name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.1."
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Verify tag is on main
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          git fetch --no-tags origin main
          git fetch origin "refs/tags/$tag:refs/tags/$tag"
          tag_commit="$(git rev-list -n 1 "$tag")"
          git merge-base --is-ancestor "$tag_commit" origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag
        env:
          GITHUB_REF_TYPE: tag
          GITHUB_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: pnpm run release:verify

      - name: Run quality gate
        run: pnpm run quality

      - name: Prepare release notes
        run: pnpm --silent run release:notes "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" > .release-notes.md

      - name: Publish npm packages
        run: pnpm run release:publish:npm

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          version="${tag#v}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "prettui $version" \
              --latest \
              --prerelease=false \
              --notes-file .release-notes.md
          else
            gh release create "$tag" \
              --verify-tag \
              --latest \
              --title "prettui $version" \
              --notes-file .release-notes.md
          fi
